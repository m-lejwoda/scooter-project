services:
  web:
    build: .
    ports: 
      - 8080:8080
    environment:
      - POSTGRES_NAME=Test
      - POSTGRES_DB=test
      - POSTGRES_PORT=5000
      - POSTGRES_USER=Test
      - POSTGRES_PASSWORD=password
  db:
    image: postgis/postgis:18-3.6
    restart: always
    volumes: postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_NAME=Test
      - POSTGRES_DB=test
      - POSTGRES_PORT=5000
      - POSTGRES_USER=Test
      - POSTGRES_PASSWORD=password
